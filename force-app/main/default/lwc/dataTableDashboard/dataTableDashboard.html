<template>
    <lightning-card title="Account Data Dashboard" icon-name="standard:account">

        <lightning-button
            slot="actions"
            label="New"
            variant="brand"
            icon-name="utility:add"
            onclick={openNewRecordModal}>
        </lightning-button>

        <div class="slds-p-horizontal_medium slds-p-bottom_small">
            <lightning-input
                type="search"
                label="Search Accounts"
                placeholder="Search by account name..."
                variant="label-hidden"
                onchange={handleSearch}>
            </lightning-input>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:true={hasRecords}>
            <lightning-datatable
                key-field="Id"
                data={accounts}
                columns={columns}
                draft-values={draftValues}
                onsave={handleSave}
                oncancel={handleCancel}
                hide-checkbox-column>
            </lightning-datatable>

            <div class="slds-grid slds-grid_align-spread slds-p-around_medium slds-grid_vertical-align-center">
                <lightning-button
                    label="Previous"
                    icon-name="utility:chevronleft"
                    onclick={handlePrevious}
                    disabled={isFirstPage}>
                </lightning-button>

                <span class="slds-text-body_regular slds-text-color_weak">
                    Page {pageNumber} of {totalPages} &middot; {totalRecords} records
                </span>

                <lightning-button
                    label="Next"
                    icon-name="utility:chevronright"
                    icon-position="right"
                    onclick={handleNext}
                    disabled={isLastPage}>
                </lightning-button>
            </div>
        </template>

        <template if:true={hasNoRecords}>
            <div class="slds-align_absolute-center slds-p-around_large slds-text-color_weak">
                No matching records found.
            </div>
        </template>

    </lightning-card>

    <template if:true={showNewRecordModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button
                        class="slds-button slds-button_icon slds-modal__close"
                        title="Close"
                        onclick={closeNewRecordModal}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">New Account</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form
                        object-api-name="Account"
                        onsuccess={handleNewRecordSuccess}
                        onerror={handleNewRecordError}>
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name="Name"></lightning-input-field>
                        <lightning-input-field field-name="Industry"></lightning-input-field>
                        <lightning-input-field field-name="Phone"></lightning-input-field>
                        <lightning-input-field field-name="AnnualRevenue"></lightning-input-field>
                        <lightning-input-field field-name="Rating"></lightning-input-field>

                        <div class="slds-modal__footer slds-p-top_medium">
                            <lightning-button
                                label="Cancel"
                                onclick={closeNewRecordModal}
                                class="slds-m-right_x-small">
                            </lightning-button>
                            <lightning-button
                                variant="brand"
                                type="submit"
                                label="Save">
                            </lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
